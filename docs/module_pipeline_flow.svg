  <path class="arrow-soft" d="M 1210 479 C 1098 624 1016 746 951 818"/>
  <path class="arrow" d="M 706 563 C 826 650 1068 754 1218 808"/>
  <path class="arrow" d="M 1120 609 C 1196 668 1260 748 1300 808"/>
  <path class="arrow" d="M 1416 202 C 1488 278 1502 700 1332 808"/>

  <text class="tiny" x="70" y="944">Archivo generado para visualizacion estatica. Fuente conceptual: estructura actual de carpetas y modulos pipeline/*, medium/*, core/*, external/* y peanuts/*.</text>
