  <path class="arrow-soft" d="M 338 489 C 374 489 390 538 424 563"/>
  <path class="arrow-soft" d="M 338 599 L 424 563"/>

  <rect class="band" x="822" y="286" width="730" height="430"/>
  <text class="section" x="844" y="316">Pipeline atmosferico</text>

  <rect class="box atm" x="850" y="342" width="270" height="74"/>
  <text class="label" x="870" y="368">external/mceq, honda</text>
  <text class="tiny" x="870" y="388">flujos Phi_beta(E, theta, h)</text>
  <text class="tiny" x="870" y="404">generacion y tablas externas</text>

  <rect class="box atm" x="850" y="454" width="270" height="74"/>
  <text class="label" x="870" y="480">medium.atmosphere.io</text>
  <text class="tiny" x="870" y="500">load_directory</text>
  <text class="tiny" x="870" y="516">seleccion de datos de flujo</text>

  <rect class="box atm" x="850" y="566" width="270" height="86"/>
  <text class="label" x="870" y="592">pipeline_atmosphere.py</text>
  <text class="tiny" x="870" y="612">select particle + angle</text>
  <text class="tiny" x="870" y="629">propaga atmosfera y Tierra</text>
  <text class="tiny" x="870" y="646">integra sobre altura h</text>

  <rect class="box atm" x="1210" y="330" width="270" height="74"/>
  <text class="label" x="1230" y="356">medium/atmosphere</text>
  <text class="tiny" x="1230" y="376">geometria, densidad</text>
  <text class="tiny" x="1230" y="392">S_atm(E,h,theta)</text>

  <rect class="box atm" x="1210" y="442" width="270" height="74"/>
  <text class="label" x="1230" y="468">medium/earth</text>
  <text class="tiny" x="1230" y="488">S_earth(E,theta)</text>
  <text class="tiny" x="1230" y="504">detector depth</text>

  <rect class="box atm" x="1210" y="554" width="270" height="74"/>
  <text class="label" x="1230" y="580">atmosphere_flux.py</text>
  <text class="tiny" x="1230" y="600">P = |S_earth S_atm|^2</text>
  <text class="tiny" x="1230" y="616">propagacion directa de flujo</text>

  <path class="arrow" d="M 985 416 L 985 452"/>
  <path class="arrow" d="M 985 528 L 985 564"/>
  <path class="arrow-soft" d="M 1120 609 C 1164 609 1164 367 1208 367"/>
  <path class="arrow-soft" d="M 1120 609 C 1164 609 1164 479 1208 479"/>
  <path class="arrow-soft" d="M 1120 609 L 1208 591"/>

  <rect class="band" x="48" y="756" width="1504" height="156"/>
  <text class="section" x="70" y="786">Capas compartidas y salida</text>

  <rect class="box core" x="86" y="820" width="330" height="64"/>
  <text class="label" x="106" y="846">core/</text>
  <text class="tiny" x="106" y="866">PMNS, Hamiltonianos, potenciales, evolutores, probabilidades</text>

  <rect class="box data" x="486" y="820" width="260" height="64"/>
  <text class="label" x="506" y="846">data/</text>
  <text class="tiny" x="506" y="866">perfiles, densidades, espectros, tablas</text>

  <rect class="box" x="816" y="820" width="250" height="64"/>
  <text class="label" x="836" y="846">util/</text>
  <text class="tiny" x="836" y="866">contexto, tipos, IO, constantes</text>

  <rect class="box out" x="1136" y="810" width="330" height="84"/>
  <text class="label" x="1156" y="836">Salidas .pt</text>
  <text class="tiny" x="1156" y="856">metadata + tensores</text>
  <text class="tiny" x="1156" y="873">probabilidades, fluxes, grids, estados</text>

  <path class="arrow" d="M 566 686 C 566 746 330 746 275 818"/>
  <path class="arrow" d="M 1345 628 C 1345 746 370 746 290 818"/>
